databases:
  - name: cv-analyzer-db
    databaseName: cv_analyzer
    user: cv_analyzer_user
    plan: free

services:
  - type: web
    name: cv-analyzer-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: cv-analyzer-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: cv-analyzer-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: OPENAI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false

  - type: web
    name: cv-analyzer-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: cv-analyzer-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

